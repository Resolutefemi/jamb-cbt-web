<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>The Pace Setter Academy — Portal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,700;1,700&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --em:       #10b981;
      --em-dim:   rgba(16,185,129,0.12);
      --em-glow:  rgba(16,185,129,0.25);
      --em-ring:  rgba(16,185,129,0.4);
      --bg:       #040d0a;
      --bg2:      #0a1610;
      --surface:  rgba(8,18,12,0.88);
      --border:   rgba(16,185,129,0.12);
      --border2:  rgba(255,255,255,0.07);
      --text:     #e4ede8;
      --muted:    #5a7a68;
      --danger:   #f87171;
      --good:     #34d399;
      --font:     'Space Grotesk', sans-serif;
      --mono:     'DM Mono', monospace;
      --serif:    'Fraunces', serif;
    }

    html {
      height: 100%;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Animated background ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(100px); opacity: 0.55;
    }
    .blob-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(16,185,129,0.18), transparent 70%);
      top: -12%; left: -8%;
      animation: drift1 14s ease-in-out infinite;
    }
    .blob-2 {
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(52,211,153,0.1), transparent 70%);
      bottom: -10%; right: -6%;
      animation: drift2 18s ease-in-out infinite;
    }
    .blob-3 {
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(16,185,129,0.08), transparent 70%);
      top: 50%; left: 55%;
      animation: drift1 22s ease-in-out infinite reverse;
    }
    /* Grid overlay */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(16,185,129,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16,185,129,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    @keyframes drift1 { 0%,100% { transform:translate(0,0); } 50% { transform:translate(24px,18px); } }
    @keyframes drift2 { 0%,100% { transform:translate(0,0); } 50% { transform:translate(-18px,22px); } }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0);    }
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Page wrapper ── */
    .page {
      position: relative; z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 2.5rem 1.25rem 3rem;
      margin: auto;
      animation: fadeUp 0.5s cubic-bezier(0,0,0.2,1) both;
    }

    /* ── Logo / Brand ── */
    .brand {
      text-align: center;
      margin-bottom: 2.4rem;
    }
    .brand-icon {
      width: 58px; height: 58px;
      background: linear-gradient(135deg, var(--em), #059669);
      border-radius: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 1.5rem;
      font-weight: 500;
      color: #030a06;
      margin-bottom: 1rem;
      box-shadow: 0 8px 32px var(--em-glow), 0 0 0 1px rgba(16,185,129,0.3);
    }
    .brand h1 {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    .brand h1 em { font-style: italic; color: var(--em); }
    .brand p {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-top: 0.5rem;
      font-weight: 500;
      font-family: var(--mono);
    }

    /* ── Glass card ── */
    .card {
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2.6rem 2.2rem;
      box-shadow: 0 32px 64px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(16,185,129,0.06) inset;
      position: relative;
      overflow: hidden;
    }
    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(16,185,129,0.5), transparent);
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 2rem;
    }
    .tab {
      flex: 1; padding: 0.6rem;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      transition: all 0.22s;
    }
    .tab.active {
      background: linear-gradient(135deg, var(--em), #059669);
      color: #030a06;
      box-shadow: 0 4px 16px var(--em-glow);
    }

    /* ── Forms ── */
    .form { display: none; flex-direction: column; gap: 1.1rem; }
    .form.active { display: flex; animation: fadeUp 0.28s cubic-bezier(0,0,0.2,1) both; }

    .field-label {
      display: block;
      font-size: 0.69rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.4rem;
      margin-left: 2px;
    }

    .field-wrap { position: relative; }

    .field-icon {
      position: absolute; left: 0.9rem; top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      color: var(--muted);
      pointer-events: none;
      line-height: 1;
    }

    .field {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border2);
      border-radius: 13px;
      padding: 0.9rem 2.8rem 0.9rem 2.55rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .field:focus {
      border-color: var(--em-ring);
      background: rgba(16,185,129,0.05);
      box-shadow: 0 0 0 3px var(--em-dim);
    }
    .field::placeholder { color: rgba(90,122,104,0.6); }

    .eye-btn {
      position: absolute; right: 0.85rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1rem; padding: 0;
      line-height: 1; transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--em); }

    /* ── Submit button ── */
    .submit-btn {
      width: 100%; padding: 1rem 1.5rem;
      background: linear-gradient(135deg, var(--em), #059669);
      color: #030a06;
      border: none; border-radius: 14px;
      font-family: var(--font);
      font-weight: 700; font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 4px 20px var(--em-glow);
      transition: all 0.22s;
      margin-top: 0.4rem;
    }
    .submit-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 30px var(--em-glow); filter: brightness(1.08); }
    .submit-btn:active { transform: scale(0.97); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

    /* ── Messages ── */
    .msg {
      font-size: 0.79rem; font-weight: 600;
      padding: 0.6rem 0.9rem;
      border-radius: 9px;
      display: none;
    }
    .msg.err { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: var(--danger); }
    .msg.ok  { background: rgba(52,211,153,0.1);  border: 1px solid rgba(52,211,153,0.25);  color: var(--good); }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.68rem; color: var(--muted);
      font-family: var(--mono); letter-spacing: 0.1em;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border2);
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.9;
      font-family: var(--mono);
    }
    .footer a {
      color: var(--muted); text-decoration: none;
      transition: color 0.2s;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .footer a:hover { color: var(--em); }
    .footer .contact-row {
      display: flex; align-items: center; justify-content: center;
      flex-wrap: wrap; gap: 0.5rem 1.5rem;
      margin-top: 0.4rem;
    }
    .footer .credit {
      margin-top: 0.8rem;
      font-weight: 700;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* ── Spinner (button loading) ── */
    .btn-spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid rgba(3,10,6,0.3);
      border-top-color: #030a06;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .page { padding: 1.5rem 1rem 2.5rem; }
      .card { padding: 1.8rem 1.2rem; border-radius: 20px; }
      .brand { margin-bottom: 1.6rem; }
      .brand h1 { font-size: 1.35rem; }
      .brand-icon { width: 50px; height: 50px; font-size: 1.3rem; margin-bottom: 0.75rem; }
      .tabs { margin-bottom: 1.5rem; }
      .form { gap: 0.9rem; }
      .field { font-size: 16px; /* prevents iOS zoom on focus */ }
      .submit-btn { padding: 0.9rem 1.2rem; font-size: 0.9rem; }
    }

    @media (max-width: 360px) {
      .page { padding: 1.2rem 0.75rem 2rem; }
      .card { padding: 1.5rem 1rem; }
      .brand h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg-layer">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="bg-grid"></div>

  <div class="page">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">T</div>
      <h1>The Pace Setter<br/><em>Academy</em></h1>
      <p>CBT Practice Portal</p>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" id="tab-login"  onclick="switchTab('login')">Sign In</button>
        <button class="tab"        id="tab-signup" onclick="switchTab('signup')">Create Account</button>
      </div>

      <!-- ── LOGIN ── -->
      <div id="form-login" class="form active">
        <div>
          <label class="field-label">Email Address</label>
          <div class="field-wrap">
            <span class="field-icon">✉</span>
            <input class="field" type="email" id="l-email" placeholder="you@example.com" required/>
          </div>
        </div>
        <div>
          <label class="field-label">Password</label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input class="field" type="password" id="l-pass" placeholder="Your password" required/>
            <button class="eye-btn" type="button" onclick="togglePwd('l-pass')">👁</button>
          </div>
        </div>
        <div id="l-err" class="msg err"></div>
        <div id="l-ok"  class="msg ok"></div>
        <button class="submit-btn" id="btn-login" onclick="doLogin()">
          <span id="btn-login-txt">Enter Dashboard</span>
        </button>
      </div>

      <!-- ── SIGN UP ── -->
      <div id="form-signup" class="form">
        <div>
          <label class="field-label">Full Name</label>
          <div class="field-wrap">
            <span class="field-icon">👤</span>
            <input class="field" type="text" id="s-name" placeholder="Your full name" required/>
          </div>
        </div>
        <div>
          <label class="field-label">Phone Number</label>
          <div class="field-wrap">
            <span class="field-icon">📞</span>
            <input class="field" type="tel" id="s-phone" placeholder="e.g. 09110228210" required/>
          </div>
        </div>
        <div>
          <label class="field-label">Email Address</label>
          <div class="field-wrap">
            <span class="field-icon">✉</span>
            <input class="field" type="email" id="s-email" placeholder="you@example.com" required/>
          </div>
        </div>
        <div>
          <label class="field-label">Password <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;">(min. 6 characters)</span></label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input class="field" type="password" id="s-pass" placeholder="Create a strong password" required/>
            <button class="eye-btn" type="button" onclick="togglePwd('s-pass')">👁</button>
          </div>
        </div>
        <div id="s-err" class="msg err"></div>
        <div id="s-ok"  class="msg ok"></div>
        <button class="submit-btn" id="btn-signup" onclick="doSignup()">
          <span id="btn-signup-txt">Create My Account</span>
        </button>
      </div>

    </div><!-- /card -->

    <!-- Footer -->
    <footer class="footer">
      <div class="contact-row">
        <p>✉ <span class="__cf_email__"   📧 eoluwadamilolavictor1320@gmail.com </span></p>
      </div>
      <div class="contact-row">
        <a href="tel:08104735560">📞 08104735560</a>
        <a href="tel:09110228210">📞 09110228210</a>
      </div>
      <div>&copy; 2024 The Pace Setter Academy. All rights reserved.</div>
      <div class="credit">Built by Resolute Femi</div>
    </footer>

  </div><!-- /page -->

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="app.js"></script>

  <script>
    /* ── Tab switching ── */
    function switchTab(mode) {
      const isLogin = mode === 'login';
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-signup').classList.toggle('active', !isLogin);
      document.getElementById('form-login').classList.toggle('active', isLogin);
      document.getElementById('form-signup').classList.toggle('active', !isLogin);
      clearMsgs();
    }

    /* ── Password toggle ── */
    function togglePwd(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    /* ── Message helpers ── */
    function showErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.style.display = msg ? 'block' : 'none';
    }
    function showOk(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.style.display = msg ? 'block' : 'none';
    }
    function clearMsgs() {
      ['l-err','l-ok','s-err','s-ok'].forEach(id => {
        const el = document.getElementById(id);
        el.style.display = 'none'; el.textContent = '';
      });
    }

    /* ── Loading state ── */
    function setLoading(btnId, txtId, loading, defaultTxt) {
      const btn = document.getElementById(btnId);
      const txt = document.getElementById(txtId);
      btn.disabled = loading;
      txt.innerHTML = loading
        ? `<span class="btn-spinner"></span> Please wait…`
        : defaultTxt;
    }

    /* ── LOGIN ── */
    async function doLogin() {
      clearMsgs();
      const email    = document.getElementById('l-email').value.trim();
      const password = document.getElementById('l-pass').value;
      if (!email || !password) { showErr('l-err', 'Please fill in all fields.'); return; }

      setLoading('btn-login', 'btn-login-txt', true, 'Enter Dashboard');

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      setLoading('btn-login', 'btn-login-txt', false, 'Enter Dashboard');

      if (error) {
        showErr('l-err', error.message);
      } else {
        showOk('l-ok', '✓ Welcome back! Redirecting…');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
      }
    }

    /* ── SIGN UP ── */
    async function doSignup() {
      clearMsgs();
      const name     = document.getElementById('s-name').value.trim();
      const phone    = document.getElementById('s-phone').value.trim();
      const email    = document.getElementById('s-email').value.trim();
      const password = document.getElementById('s-pass').value;

      if (!name || !phone || !email || !password) {
        showErr('s-err', 'All fields are required.'); return;
      }
      if (password.length < 6) {
        showErr('s-err', 'Password must be at least 6 characters.'); return;
      }

      setLoading('btn-signup', 'btn-signup-txt', true, 'Create My Account');

      const { data, error } = await sb.auth.signUp({
        email, password,
        options: { data: { full_name: name, phone } }
      });

      setLoading('btn-signup', 'btn-signup-txt', false, 'Create My Account');

      if (error) {
        showErr('s-err', error.message);
      } else {
        if (data.user) {
          await sb.from('profiles').insert({ id: data.user.id, full_name: name, email, phone });
        }
        showOk('s-ok', '✓ Account created! Please verify your email, then sign in.');
        setTimeout(() => switchTab('login'), 2800);
      }
    }
  </script>
</body>
</html>
